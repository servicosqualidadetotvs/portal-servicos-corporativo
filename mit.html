<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIT - Portal de Serviços Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <img src="https://tdn.totvs.com/download/attachments/1032134307/logo-totvs-branco%20%281%29.webp?api=v2" alt="TOTVS Logo" class="logo-header">
            <p>Portal de Gestão e Serviços</p>
            <h1>Serviços Corporativo <span>2026</span></h1>
            <button class="btn-info" onclick="abrirModal('Informações Gerais', 'Central de informações da equipe de Serviços Corporativo.')">
                Informações gerais sobre o portal
            </button>
            <button class="btn-theme" onclick="toggleTheme()" title="Alternar Tema">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="container">
        <section class="section-area">
            <p class="label-linha">Módulos e Processos</p>
            <h2 class="titulo-secao">MIT</h2>
            
            <p>Esta é uma página placeholder para o módulo MIT. Detalhes e integrações sobre a frente MIT serão adicionados aqui.</p>
        </section>
    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-card">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <div class="modal-header">
                <i class="fa-solid fa-circle-info"></i>
                <h2 id="modalTitle">Título</h2>
            </div>
            <div class="modal-body"><p id="modalDescription"></p></div>
            <div class="modal-footer"><button class="btn-close-footer" onclick="fecharModal()">Fechar</button></div>
        </div>
    </div>

    <footer class="footer">
        <img src="https://tdn.totvs.com/download/attachments/1032134307/logo-totvs-branco%20%281%29.webp?api=v2" alt="TOTVS Logo" class="logo-footer">
        <p>&copy; 2026 Portal de Serviços Corporativo. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
